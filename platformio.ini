[platformio]
src_dir = .

[env:esp01]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 115200
; No SPIFFS — maximize sketch space for OTA (2 × ~502KB partitions)
board_build.ldscript = eagle.flash.1m.ld
lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.0.0
    thingpulse/ESP8266 Weather Station@^2.0.0
    squix78/JsonStreamingParser@^1.0.0

[env:esp01_ota]
extends = env:esp01
upload_protocol = espota
upload_port = weatherclock.local
